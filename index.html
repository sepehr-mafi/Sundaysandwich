<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ساندی سندویچ</title>

<style>
body{font-family:sans-serif;background:#f5f5f5;margin:0}
header{background:#ff6b00;color:#fff;padding:20px;text-align:center}

.container{max-width:900px;margin:auto;padding:20px}

.card{
background:#fff;
padding:12px;
margin:10px 0;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
background:#ff6b00;
color:#fff;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
margin:2px;
}

.cart{
background:#fff;
padding:15px;
margin-top:20px;
border-radius:10px;
}

.item-row{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px 0;
border-bottom:1px solid #eee;
}

.qty-controls button{
padding:4px 8px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:8px;
}
</style>
</head>

<body>

<header>
<h1>🍔 ساندی سندویچ</h1>
</header>

<div class="container">

<h2>منو</h2>

<div class="card">
<span>ساندویچ ساندی اسپشیال</span>
<button onclick="add('ساندویچ ساندی اسپشیال',540000)">افزودن</button>
</div>

<div class="card">
<span>ساندویچ بوقلمون ساندی اسپشیال</span>
<button onclick="add('ساندویچ بوقلمون ساندی اسپشیال',620000)">افزودن</button>
</div>

<div class="card">
<span>سیب زمینی سرخ کرده</span>
<button onclick="add('سیب زمینی سرخ کرده',50000)">افزودن</button>
</div>

<!-- 🛒 سبد خرید -->
<div class="cart">

<h2>🛒 سبد خرید</h2>
<div id="cart"></div>

<label>تاریخ تحویل</label>
<select id="deliveryDate"></select>

<label>ساعت تحویل</label>
<select id="deliveryTime"></select>

<input id="name" placeholder="نام">
<input id="phone" placeholder="شماره">

<button onclick="submitOrder()">ثبت سفارش</button>

</div>

</div>

<script>

let cart = [];

// ➕ افزودن
function add(name, price){

let item = cart.find(i => i.name === name);

if(item){
item.qty++;
}else{
cart.push({name, price, qty:1});
}

render();
}

// ➖ کم کردن
function minus(name){

let item = cart.find(i => i.name === name);

if(!item) return;

item.qty--;

if(item.qty <= 0){
cart = cart.filter(i => i.name !== name);
}

render();
}

// 🧾 نمایش سبد
function render(){

let html = "";

cart.forEach(i => {

html += `
<div class="item-row">
<span>${i.name} = ${i.price * i.qty}</span>

<div class="qty-controls">
<button onclick="minus('${i.name}')">-</button>
<span>${i.qty}</span>
<button onclick="add('${i.name}',${i.price})">+</button>
</div>

</div>
`;
});

document.getElementById("cart").innerHTML = html;
}

// 📅 تاریخ (امروز/فردا/پس‌فردا)
const dateSelect = document.getElementById("deliveryDate");
const names = ["امروز", "فردا", "پس‌فردا"];

for(let i=0;i<3;i++){
let d = new Date();
d.setDate(d.getDate()+i);

dateSelect.innerHTML += `
<option value="${d.toISOString().split("T")[0]}">
${names[i]}
</option>`;
}

// ⏰ ساعت (12 تا 15)
const timeSelect = document.getElementById("deliveryTime");

for(let h=12; h<=15; h++){
timeSelect.innerHTML += `<option>${h}:00</option>`;
if(h < 15){
timeSelect.innerHTML += `<option>${h}:30</option>`;
}
}

// ⛔ محدودیت فقط برای امروز بعد از 11
function checkOrderTime(){

let selectedDate = document.getElementById("deliveryDate").value;

let now = new Date();
let today = new Date().toISOString().split("T")[0];
let hour = now.getHours();

if(selectedDate === today && hour >= 11){
alert("⛔ سفارش امروز بعد از ساعت 11 بسته شده است");
return false;
}

return true;
}

// 📤 ارسال به Google Sheets
function submitOrder(){

if(!checkOrderTime()) return;

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;

if(!name || !phone || cart.length === 0){
alert("اطلاعات کامل نیست");
return;
}

let data = {
name,
phone,
items: cart.map(i => `${i.name} × ${i.qty}`).join(", "),
total: cart.reduce((s,i)=>s+i.price*i.qty,0),
date: document.getElementById("deliveryDate").value,
time: document.getElementById("deliveryTime").value
};

fetch("https://script.google.com/macros/s/AKfycbz5JAhX8CRntH0-kznHOuw_mfXcSdC6idlThwb7M9RwNPrqMmXy3kiVtvdnc4wZz6fA9w/exec", {
method: "POST",
body: JSON.stringify(data)
});

alert("سفارش ثبت شد");

cart = [];
render();
}

</script>

</body>
</html>
